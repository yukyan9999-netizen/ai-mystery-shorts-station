media_mix:
  target_real_media_percent: 78
  minimum_real_media_percent: 60
  maximum_ai_generated_percent: 50
  community_sources_enabled: true
  international_community_sources_enabled: true
  community_material_default_use: reference_only
  require_license_evidence_for_final_media: true
  allow_unverified_mysteries: true
